services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  student-db:
    image: postgres:16
    container_name: student-db
    environment:
      POSTGRES_USER: student
      POSTGRES_PASSWORD: studentpw
      POSTGRES_DB: studentdb
    ports:
      - "5432:5432"
    volumes:
      - student-db-data:/var/lib/postgresql/data

  course-db:
    image: postgres:16
    container_name: course-db
    environment:
      POSTGRES_USER: course
      POSTGRES_PASSWORD: coursepw
      POSTGRES_DB: coursedb
    ports:
      - "5433:5432"
    volumes:
      - course-db-data:/var/lib/postgresql/data

  enrollment-db:
    image: postgres:16
    container_name: enrollment-db
    environment:
      POSTGRES_USER: enrollment
      POSTGRES_PASSWORD: enrollmentpw
      POSTGRES_DB: enrollmentdb
    ports:
      - "5434:5432"
    volumes:
      - enrollment-db-data:/var/lib/postgresql/data

  student-service:
    build:
      context: .
      dockerfile: src/StudentService/Dockerfile
    container_name: student-service
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: Host=student-db;Port=5432;Database=studentdb;Username=student;Password=studentpw
    depends_on:
      - student-db
    ports:
      - "5001:8080"

  course-service:
    build:
      context: .
      dockerfile: src/CourseService/Dockerfile
    container_name: course-service
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: Host=course-db;Port=5432;Database=coursedb;Username=course;Password=coursepw
      RabbitMq__HostName: rabbitmq
      RabbitMq__UserName: guest
      RabbitMq__Password: guest
      RabbitMq__QueueName: enrollment.created
    depends_on:
      - course-db
      - rabbitmq
    ports:
      - "5002:8080"

  enrollment-service:
    build:
      context: .
      dockerfile: src/EnrollmentService/Dockerfile
    container_name: enrollment-service
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: Host=enrollment-db;Port=5432;Database=enrollmentdb;Username=enrollment;Password=enrollmentpw
      Services__StudentServiceBaseUrl: http://student-service:8080
      Services__CourseServiceBaseUrl: http://course-service:8080
      RabbitMq__HostName: rabbitmq
      RabbitMq__UserName: guest
      RabbitMq__Password: guest
      RabbitMq__QueueName: enrollment.created
    depends_on:
      - enrollment-db
      - student-service
      - course-service
      - rabbitmq
    ports:
      - "5003:8080"

  api-gateway:
    build:
      context: .
      dockerfile: src/ApiGateway/Dockerfile
    container_name: api-gateway
    environment:
      ASPNETCORE_URLS: http://+:8080
    depends_on:
      - student-service
      - course-service
      - enrollment-service
    ports:
      - "5000:8080"

  web-ui:
    build:
      context: ./web-ui
      dockerfile: Dockerfile
    container_name: web-ui
    depends_on:
      - api-gateway
    ports:
      - "8080:80"

volumes:
  student-db-data:
  course-db-data:
  enrollment-db-data:
